<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>观看报告 - 组7</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- First Round - Group 7 Summary (copied from Group 2) -->
        <div id="round1SummaryPage" class="summary-content" data-save-url="{{ url_for('save_summary_duration') }}" data-round="1">
            <h1>提示信息</h1>
            
            <!-- Warning Box -->
            <div class="warning-box">
                <div class="warning-icon">📘</div>
                <div class="warning-title">短视频相关介绍</div>
            </div>
            
            <div class="warning-text">
                <p>短视频是指时长在5分钟以内，在新媒体平台上播放的，适合在移动和短时休闲状态下观看的高频推送的视频内容。</p>
                <p>2013年10月我国第一款短视频应用秒拍正式上线。</p>
                <p>随后短视频飞速走红，成为不可缺少的信息传播载体。</p>
            </div>
            
            <div class="next-step-content">
                <p>浏览以上信息并点击“继续”按钮进行下一步！</p>
                <a href="{{ url_for('categories') }}" class="continue-link-button">
                    <span class="arrow-icon">👉</span>
                    <span>继续</span>
                </a>
            </div>
        </div>
        
        <script src="{{ url_for('static', filename='js/summary_round1.js') }}" defer></script>
    </div>
</body>
</html>
